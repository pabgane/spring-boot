<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#fff0f5; font-family:'Segoe UI',sans-serif;}
        .card{border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,0.08); padding:30px;}
        .section-title{font-weight:800; color:#c2185b;}
        .form-label{font-weight:600; color:#ad1457;}
        .btn-save{background:#ec407a;color:white;font-weight:600;}
        .btn-update{background:#f8bbd0;color:#880e4f;font-weight:600;}
        .btn-delete{background:#f06292;color:white;font-weight:600;}
        .btn-clear{background:#fce4ec;color:#ad1457;font-weight:600;}
        .table thead{background:#f8bbd0;color:#6a1b4d;font-weight:700;}
        .table tbody tr:hover{background:#fff0f5;cursor:pointer;}
        .navbar{margin-bottom:20px;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="index.html">Home</a>
        <a class="navbar-brand" href="customer.html">Customer</a>
        <a class="navbar-brand" href="item.html">Item</a>
        <a class="navbar-brand" href="order.html">Order</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card mb-4">
        <h3 class="section-title text-center mb-3">Customer Management</h3>
        <div class="row g-3">
            <div class="col-md-4"><label class="form-label">Customer ID</label><input type="text" id="customerId" class="form-control"></div>
            <div class="col-md-4"><label class="form-label">Name</label><input type="text" id="customerName" class="form-control"></div>
            <div class="col-md-4"><label class="form-label">Address</label><input type="text" id="customerAddress" class="form-control"></div>
        </div>
        <div class="text-center mt-4">
            <button class="btn btn-save me-2" id="saveBtn">Save</button>
            <button class="btn btn-update me-2" id="updateBtn">Update</button>
            <button class="btn btn-delete me-2" id="deleteBtn">Delete</button>
            <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>
    </div>

    <div class="card p-4">
        <table class="table table-bordered text-center align-middle">
            <thead>
            <tr>
                <th>Customer ID</th><th>Name</th><th>Address</th>
            </tr>
            </thead>
            <tbody id="customerTable"></tbody>
        </table>
    </div>
</div>

<script>
    let customers = JSON.parse(localStorage.getItem("customers")||"[]");
    const customerTable = document.getElementById("customerTable");

    function renderTable(){
        customerTable.innerHTML = "";
        customers.forEach(c=>{
            customerTable.innerHTML += `<tr onclick="selectCustomer('${c.id}')">
            <td>${c.id}</td><td>${c.name}</td><td>${c.address}</td>
        </tr>`;
        });
        localStorage.setItem("customers", JSON.stringify(customers));
    }

    function selectCustomer(id){
        let c = customers.find(c=>c.id===id);
        document.getElementById("customerId").value=c.id;
        document.getElementById("customerName").value=c.name;
        document.getElementById("customerAddress").value=c.address;
    }

    function clearForm(){
        document.getElementById("customerId").value="";
        document.getElementById("customerName").value="";
        document.getElementById("customerAddress").value="";
    }

    function validateCustomer(){
        if(!document.getElementById("customerId").value || !document.getElementById("customerName").value) { alert("Fill required fields"); return false; }
        return true;
    }

    document.getElementById("saveBtn").addEventListener("click",()=>{
        if(!validateCustomer()) return;
        let id=document.getElementById("customerId").value;
        if(customers.find(c=>c.id===id)){alert("ID exists"); return;}
        customers.push({
            id:id,
            name:document.getElementById("customerName").value,
            address:document.getElementById("customerAddress").value
        });
        renderTable(); clearForm();
    });

    document.getElementById("updateBtn").addEventListener("click",()=>{
        let id=document.getElementById("customerId").value;
        let index=customers.findIndex(c=>c.id===id);
        if(index===-1){alert("Not found"); return;}
        customers[index].name=document.getElementById("customerName").value;
        customers[index].address=document.getElementById("customerAddress").value;
        renderTable(); clearForm();
    });

    document.getElementById("deleteBtn").addEventListener("click",()=>{
        let id=document.getElementById("customerId").value;
        customers=customers.filter(c=>c.id!==id);
        renderTable(); clearForm();
    });

    document.getElementById("clearBtn").addEventListener("click",clearForm);
    renderTable();
</script>
</body>
</html>
