<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#fff0f5;}
        .card{border-radius:20px; box-shadow:0 10px 25px rgba(255,77,136,.15);}
        .section-title{font-weight:800; color:#c2185b;}
        .form-label{font-weight:600;}
        .btn-save{background:#ff4d88;color:white;}
        .btn-update{background:#ff99b3;}
        .btn-delete{background:#ffc2d1;}
        .btn-clear{background:#ffe6ee;color:#000;}
        .table thead{background:#ff4d88;color:white;}
        .table tbody tr:hover{background:#ffe6f0;cursor:pointer;}
        .navbar{margin-bottom:20px;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="index.html">Home</a>
        <a class="navbar-brand" href="customer.html">Customer</a>
        <a class="navbar-brand" href="item.html">Item</a>
        <a class="navbar-brand" href="order.html">Order</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card mb-4">
        <h3 class="section-title text-center mb-3">Item Management</h3>
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Item ID</label><input type="text" id="itemId" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">Name</label><input type="text" id="itemName" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">Qty</label><input type="number" id="itemQty" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">Price</label><input type="number" id="itemPrice" class="form-control"></div>
        </div>
        <div class="text-center mt-4">
            <button class="btn btn-save me-2" id="saveBtn">Save</button>
            <button class="btn btn-update me-2" id="updateBtn">Update</button>
            <button class="btn btn-delete me-2" id="deleteBtn">Delete</button>
            <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>
    </div>

    <div class="card p-4">
        <table class="table table-bordered text-center align-middle">
            <thead>
            <tr>
                <th>Item ID</th><th>Name</th><th>Qty</th><th>Price</th>
            </tr>
            </thead>
            <tbody id="itemTable"></tbody>
        </table>
    </div>
</div>

<script>
    let items=JSON.parse(localStorage.getItem("items")||"[]");
    const itemTable=document.getElementById("itemTable");

    function renderTable(){
        itemTable.innerHTML="";
        items.forEach(i=>{
            itemTable.innerHTML+=`<tr onclick="selectItem('${i.id}')">
            <td>${i.id}</td><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td>
        </tr>`;
        });
        localStorage.setItem("items", JSON.stringify(items));
    }

    function selectItem(id){
        let i=items.find(i=>i.id===id);
        document.getElementById("itemId").value=i.id;
        document.getElementById("itemName").value=i.name;
        document.getElementById("itemQty").value=i.qty;
        document.getElementById("itemPrice").value=i.price;
    }

    function clearForm(){
        document.getElementById("itemId").value="";
        document.getElementById("itemName").value="";
        document.getElementById("itemQty").value="";
        document.getElementById("itemPrice").value="";
    }

    document.getElementById("saveBtn").addEventListener("click",()=>{
        let id=document.getElementById("itemId").value;
        if(items.find(i=>i.id===id)){alert("ID exists"); return;}
        items.push({
            id:id,
            name:document.getElementById("itemName").value,
            qty:Number(document.getElementById("itemQty").value),
            price:Number(document.getElementById("itemPrice").value)
        });
        renderTable(); clearForm();
    });
    document.getElementById("updateBtn").addEventListener("click",()=>{
        let id=document.getElementById("itemId").value;
        let index=items.findIndex(i=>i.id===id);
        if(index===-1){alert("Not found"); return;}
        items[index].name=document.getElementById("itemName").value;
        items[index].qty=Number(document.getElementById("itemQty").value);
        items[index].price=Number(document.getElementById("itemPrice").value);
        renderTable(); clearForm();
    });
    document.getElementById("deleteBtn").addEventListener("click",()=>{
        let id=document.getElementById("itemId").value;
        items=items.filter(i=>i.id!==id);
        renderTable(); clearForm();
    });
    document.getElementById("clearBtn").addEventListener("click",clearForm);
    renderTable();
</script>
</body>
</html>
