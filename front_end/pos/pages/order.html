<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#fff0f5;}
        .card{border-radius:20px; box-shadow:0 10px 25px rgba(255,77,136,.15); padding:30px; margin-top:20px;}
        .section-title{font-weight:800; color:#c2185b;}
        .form-label{font-weight:600;}
        .btn-place{background:#ff4d88; color:white;}
        .navbar{margin-bottom:20px;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="index.html">Home</a>
        <a class="navbar-brand" href="customer.html">Customer</a>
        <a class="navbar-brand" href="item.html">Item</a>
        <a class="navbar-brand" href="order.html">Order</a>
    </div>
</nav>

<div class="container">

    <div class="card">
        <h3 class="section-title text-center mb-4">Place Order (Manual ID Entry)</h3>

        <div class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Customer ID</label>
                <input type="text" id="customerId" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Item ID</label>
                <input type="text" id="itemId" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Quantity</label>
                <input type="number" id="orderQty" class="form-control" min="1" value="1">
            </div>

            <div class="col-md-6">
                <label class="form-label">Item Price</label>
                <input type="number" id="itemPrice" class="form-control" readonly>
            </div>

            <div class="col-md-6 d-flex align-items-end">
                <button class="btn btn-place w-100" id="placeOrderBtn">Place Order</button>
            </div>

        </div>
    </div>

    <div class="card mt-4">
        <h4 class="section-title mb-3">Order List</h4>
        <table class="table table-bordered text-center align-middle">
            <thead>
            <tr>
                <th>Customer ID</th>
                <th>Item ID</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
            </thead>
            <tbody id="orderTable"></tbody>
        </table>
    </div>

</div>

<script>

    // Load saved customers and items
    let customers = JSON.parse(localStorage.getItem("customers") || "[]");
    let items = JSON.parse(localStorage.getItem("items") || "[]");

    let orders = [];

    // Auto fill price when Item ID typed
    document.getElementById("itemId").addEventListener("keyup", function(){
        let itemId = this.value;
        let item = items.find(i => i.id === itemId);
        if(item){
            document.getElementById("itemPrice").value = item.price;
        } else {
            document.getElementById("itemPrice").value = "";
        }
    });

    // Place Order
    document.getElementById("placeOrderBtn").addEventListener("click", function(){

        let custId = document.getElementById("customerId").value;
        let itemId = document.getElementById("itemId").value;
        let qty = Number(document.getElementById("orderQty").value);
        let price = Number(document.getElementById("itemPrice").value);

        // Validation
        let customer = customers.find(c => c.id === custId);
        if(!customer){
            alert("Customer ID not found!");
            return;
        }

        let item = items.find(i => i.id === itemId);
        if(!item){
            alert("Item ID not found!");
            return;
        }

        if(qty <= 0){
            alert("Enter valid quantity!");
            return;
        }

        if(qty > item.qty){
            alert("Not enough stock!");
            return;
        }

        let total = qty * price;

        // Reduce stock
        item.qty -= qty;
        localStorage.setItem("items", JSON.stringify(items));

        // Add order
        orders.push({custId, itemId, qty, price, total});
        renderOrders();

        alert("Order Placed Successfully!");

        // Clear fields
        document.getElementById("customerId").value="";
        document.getElementById("itemId").value="";
        document.getElementById("orderQty").value=1;
        document.getElementById("itemPrice").value="";
    });

    // Render orders
    function renderOrders(){
        const tbody = document.getElementById("orderTable");
        tbody.innerHTML = "";
        orders.forEach(o=>{
            tbody.innerHTML += `
        <tr>
            <td>${o.custId}</td>
            <td>${o.itemId}</td>
            <td>${o.qty}</td>
            <td>${o.price}</td>
            <td>${o.total}</td>
        </tr>
        `;
        });
    }

</script>

</body>
</html>
