<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS SYSTEM • Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #fff5f8;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar{
            width: 240px;
            height: 100vh;
            background: #ffccd5;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 30px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }

        .sidebar h4{
            text-align: center;
            font-weight: 900;
            color: #b03060;
            margin-bottom: 40px;
        }

        .sidebar a{
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            font-weight: 600;
            color: #6a1b4d;
            transition: 0.3s;
        }

        .sidebar a:hover{
            background-color: #ffb3c6;
            color: white;
        }

        /* Main Content */
        .main-content{
            margin-left: 240px;
            padding: 40px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-buttons{
            text-align: center;
        }

        .main-buttons a{
            display: block;
            margin: 15px auto;
            width: 250px;
            padding: 15px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            background-color: #ff99ac;
            color: white;
            transition: 0.3s;
        }

        .main-buttons a:hover{
            background-color: #ff4d6d;
        }

    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>MINI POS SYSTEM</h4>
    <a href="#">Home</a>
    <a href="pages/customer.html">Customer</a>
    <a href="pages/item.html">Item</a>
    <a href="pages/order.html">Order</a>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="main-buttons">
        <a href="pages/order.html">Customer</a>
        <a href="pages/customer.html">Item</a>
        <a href="pages/item.html">Order</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
